<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sukarelawan | Login</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e5631 0%, #a4de02 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .login-container:hover {
            transform: translateY(-5px);
        }
        h2 {
            color: #1e5631;
            margin-bottom: 2.5rem; /* Slightly reduced margin to accommodate dropdown */
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: white;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #1e5631;
            box-shadow: 0 0 8px rgba(30, 86, 49, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: green; 
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s, letter-spacing 0.3s;
        }
        .btn-login:hover {
            background-color: #77bb02;
            letter-spacing: 1px;
        }
        .footer-text {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #666;
        }
        .footer-text a {
            color: #008000;
            text-decoration: none;
            font-weight: bold;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: -1;
        }
        .success-msg {
            color: green;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            font-weight: 600;
        }
        .error-msg {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="circle" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: 5%; right: 5%;"></div>
    <div class="login-container">
        <form action="LoginServlet" method="POST">
            <h2>E-SUKARELAWAN</h2>

            <p id="successMsg" class="success-msg">Registration successful! Please log in.</p>
            <p id="errorMsg" class="error-msg">Invalid username or password.</p>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
            
            <p class="footer-text">
                Don't have an account? <a href="register.jsp">Register here</a>
            </p>
        </form>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            
            // Checks registration triggers
            if (params.get('registered') === 'true' || params.get('success') === 'true') {
                document.getElementById('successMsg').style.display = 'block';
            }
            
            // Checks for query login failures
            if (params.get('error') === 'true') {
                const errorEl = document.getElementById('errorMsg');
                errorEl.style.display = 'block';
            } else if (params.get('error') === 'invalid_role') {
                const errorEl = document.getElementById('errorMsg');
                errorEl.innerText = "System routing failure: Invalid role profile.";
                errorEl.style.display = 'block';
            }
            
            // Clean URL query states gracefully
            if (params.get('registered') || params.get('success') || params.get('error')) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };
    </script>
</body>
</html>
